<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <!-- CHAMADA Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!--CHAMADA CSS-->
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <nav class="navbar navbar-dark bg-warning px-4">
        <span class="navbar-brand text-dark"><a href="" class="tituloHome"> Sistema de Clientes</a></span>
    </nav>
    <div class="container mt-5">

        <div id="containerPrincipal" class="d-flex justify-content-center transition">

            <!-- FORM -->
            <div id="formCard" class="card shadow p-4">
                <img src="img/mythlogo.png" class="logo"><br>
                <h6>Nome Completo</h6>
                <input type="text" id="nome" class="form-control mb-2" placeholder="Nome">
                <h6>CPF</h6>
                <input type="text" id="cpf" class="form-control mb-2" placeholder="000.000.000-00" required>
                <h6>E-mail</h6>
                <input type="email" id="email" class="form-control mb-3" placeholder="Email">
                <h6>Senha</h6>
                <div class="campo" style="position: relative;">
                    <input type="password" id="senha" class="form-control" senha placeholder="Senha">
                    <i id="olhoTeste" class="bi bi-eye olho">
                    </i>
                </div>
                <H6>Confirme sua senha</H6>
                <div class="campo" style="position: relative;">
                    <input type="password" class="form-control" senha placeholder="Confirme a Senha">
                    <i id="olhoTeste" class="bi bi-eye olho">
                    </i>
                </div>
                <h6>Data de Nascimento</h6>
                <input type="date" id="DataNasc" class="form-control mb-3" placeholder="DD/MM/AAAA">

                <button onclick="salvarUsuario()" class="btn btn-primary w-100">
                    Salvar
                </button>
            </div>


        </div>

    </div>
    <!-- JS -->
    <script src="script.js">


    </script>

</body>

</html>
